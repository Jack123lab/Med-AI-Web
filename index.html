<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=academic-community/index.html" />
    <title>Happy medical AI | 医学 AI 专家协作门户</title>
    <meta name="description" content="Happy medical AI 医学 AI 专家协作门户，面向临床、科研、算法、合规和产品转化专家开放共建。" />
    <style>
      :root {
        color-scheme: dark;
        --ink: #eaf4f8;
        --muted: #b9d0db;
        --teal: #86ddd5;
        --gold: #f1d06a;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: var(--ink);
        font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
        background:
          linear-gradient(rgba(134, 221, 213, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(134, 221, 213, 0.05) 1px, transparent 1px),
          linear-gradient(135deg, #06151f 0%, #0b2638 48%, #0d3548 100%);
        background-size: 34px 34px, 34px 34px, auto;
      }

      main {
        width: min(100%, 920px);
        padding: 40px 24px;
      }

      .mark {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        background: url("academic-community/assets/images/happy-medical-ai-mark.svg") center / cover no-repeat;
        box-shadow: 0 18px 38px rgba(6, 21, 31, 0.28);
      }

      h1 {
        margin: 22px 0 12px;
        font-size: 42px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.8;
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        padding: 0 18px;
        color: #06202b;
        text-decoration: none;
        font-weight: 800;
        background: linear-gradient(135deg, var(--teal), var(--gold));
      }

      @media (max-width: 560px) {
        h1 { font-size: 32px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>Happy medical AI 医学 AI 专家协作门户</h1>
      <p>正在进入 academic-community 门户。若浏览器没有自动跳转，请打开正式入口。</p>
      <a href="academic-community/index.html">进入 academic-community</a>
    </main>
  </body>
</html>
